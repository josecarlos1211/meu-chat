<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>ChatLivre</title>
<style>
* { margin:0; padding:0; }
html { height:100%; }
body {
  height:100%;
  background:#0f1923;
  color:#d4dde8;
  font-family:"Courier New",Courier,monospace;
  font-size:14px;
  overflow:hidden;
}

/* LOGIN */
#screen-login {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:#0f1923; display:table; width:100%; height:100%; z-index:10;
}
#login-inner { display:table-cell; vertical-align:middle; text-align:center; padding:20px; }
#login-box {
  display:inline-block; width:100%; max-width:320px;
  background:#162030; border:1px solid #1e3a52; border-radius:6px;
  padding:28px 20px; text-align:left;
}
#login-box h1 {
  font-size:20px; color:#4fc3f7; text-align:center;
  margin-bottom:4px; letter-spacing:3px; text-transform:uppercase;
}
#login-box .sub {
  text-align:center; font-size:11px; color:#456070;
  margin-bottom:22px; letter-spacing:1px;
}
#login-box label {
  display:block; font-size:11px; color:#456070;
  text-transform:uppercase; letter-spacing:1px; margin-bottom:6px;
}
#input-name {
  width:100%; background:#0f1923; border:1px solid #1e3a52;
  border-radius:4px; color:#d4dde8;
  font-family:"Courier New",monospace; font-size:15px;
  padding:10px 12px; outline:none;
  -webkit-appearance:none; -moz-appearance:none; margin-bottom:14px;
}
#input-name:focus { border-color:#4fc3f7; }
#btn-entrar {
  width:100%; background:#0d3050; border:1px solid #4fc3f7;
  color:#4fc3f7; font-family:"Courier New",monospace;
  font-size:14px; letter-spacing:2px; text-transform:uppercase;
  padding:11px; border-radius:4px; cursor:pointer; -webkit-appearance:none;
}
#btn-entrar:active { background:#0a2540; }
#login-error { color:#ef5350; font-size:12px; text-align:center; margin-top:10px; min-height:18px; }

/* CHAT */
#screen-chat { display:none; position:fixed; top:0; left:0; right:0; bottom:0; }

#chat-header {
  position:absolute; top:0; left:0; right:0; height:44px;
  background:#0d1c2a; border-bottom:1px solid #1e3a52;
  padding:0 12px; line-height:44px; overflow:hidden;
}
#header-title {
  display:inline-block; font-size:15px; color:#4fc3f7;
  letter-spacing:2px; text-transform:uppercase; vertical-align:middle;
}
#header-online {
  display:inline-block; font-size:11px; color:#456070;
  vertical-align:middle; margin-left:10px;
}
#header-online span { color:#4caf50; font-weight:bold; }
#btn-sair {
  float:right; background:none; border:none; color:#ef5350;
  font-family:"Courier New",monospace; font-size:12px; cursor:pointer;
  line-height:44px; padding:0 4px; text-transform:uppercase; letter-spacing:1px;
}

#msgs-wrap {
  position:absolute; top:44px; left:0; right:0; bottom:52px;
  overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:10px 10px 4px; background:#0f1923;
}

.msg { margin-bottom:10px; word-wrap:break-word; word-break:break-word; }
.msg-meta { font-size:11px; margin-bottom:2px; }
.msg-name { font-weight:bold; }
.msg-time { color:#2a4a62; margin-left:6px; font-size:10px; }
.msg-text {
  background:#162030; border-left:2px solid #1e3a52;
  padding:6px 10px; border-radius:0 4px 4px 0;
  font-size:13px; line-height:1.5; color:#c8d8e8;
}
.msg.own .msg-text { background:#0d2a40; border-left-color:#4fc3f7; color:#d8eef8; }
.msg-sys {
  text-align:center; font-size:11px; color:#2a4a62;
  margin:6px 0; font-style:italic;
}
.msg-sys span { color:#456080; }

#input-bar {
  position:absolute; bottom:0; left:0; right:0; height:52px;
  background:#0d1c2a; border-top:1px solid #1e3a52;
  padding:8px; display:table; width:100%;
  -webkit-box-sizing:border-box; box-sizing:border-box;
}
#input-cell { display:table-cell; width:100%; padding-right:6px; }
#input-cell input {
  width:100%; background:#0f1923; border:1px solid #1e3a52;
  border-radius:4px; color:#d4dde8;
  font-family:"Courier New",monospace; font-size:14px;
  padding:8px 10px; outline:none; -webkit-appearance:none;
  -webkit-box-sizing:border-box; box-sizing:border-box;
}
#input-cell input:focus { border-color:#4fc3f7; }
#send-cell { display:table-cell; width:44px; }
#btn-send {
  width:44px; height:36px; background:#0d3050;
  border:1px solid #4fc3f7; border-radius:4px;
  color:#4fc3f7; font-size:16px; cursor:pointer;
  -webkit-appearance:none; vertical-align:middle;
}
#btn-send:active { background:#0a2540; }

#offline-bar {
  display:none; position:fixed; top:44px; left:0; right:0;
  background:#3a0a0a; border-bottom:1px solid #c62828;
  color:#ef9a9a; font-size:12px; text-align:center; padding:5px; z-index:5;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div id="login-inner">
    <div id="login-box">
      <h1>ChatLivre</h1>
      <p class="sub">chat publico em tempo real</p>
      <label for="input-name">Seu apelido</label>
      <input type="text" id="input-name" maxlength="24" placeholder="Ex: Joao123" autocomplete="off">
      <button id="btn-entrar" onclick="entrar()">Entrar no Chat</button>
      <div id="login-error"></div>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="screen-chat">
  <div id="offline-bar">&#9888; Sem conexao. Reconectando...</div>
  <div id="chat-header">
    <span id="header-title">ChatLivre</span>
    <span id="header-online">&#9679; <span id="online-count">0</span> online</span>
    <button id="btn-sair" onclick="sair()">Sair</button>
  </div>
  <div id="msgs-wrap"></div>
  <div id="input-bar">
    <div id="input-cell">
      <input type="text" id="msg-input" placeholder="Digite uma mensagem..." maxlength="500" autocomplete="off" onkeydown="teclaEnter(event)">
    </div>
    <div id="send-cell">
      <button id="btn-send" onclick="enviar()">&#9658;</button>
    </div>
  </div>
</div>

<!-- Socket.IO é servido automaticamente pelo servidor -->
<script src="/socket.io/socket.io.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════════
var socket          = null;
var myName          = '';
var myColor         = '#4fc3f7';
var intentionalExit = false;
var refreshInterval = null; // controle único do setInterval do Opera Mini

// Detecta Opera Mini para ativar keep-alive manual
var isOperaMini = (navigator.userAgent || '').indexOf('Opera Mini') > -1;

// ═══════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════
function entrar() {
  var name = document.getElementById('input-name').value.trim();
  if (!name) {
    document.getElementById('login-error').innerHTML = 'Digite um apelido.';
    return;
  }
  document.getElementById('login-error').innerHTML = '';
  myName = name;
  document.getElementById('btn-entrar').disabled = true;
  document.getElementById('btn-entrar').innerHTML = 'Conectando...';
  conectar();
}

function sair() {
  intentionalExit = true;
  pararRefresh();
  if (socket) {
    socket.disconnect(); // Socket.IO usa disconnect(), não close()
    socket = null;
  }
  document.getElementById('screen-chat').style.display  = 'none';
  document.getElementById('screen-login').style.display = 'table';
  document.getElementById('offline-bar').style.display  = 'none';
  document.getElementById('btn-entrar').disabled = false;
  document.getElementById('btn-entrar').innerHTML = 'Entrar no Chat';
  document.getElementById('msgs-wrap').innerHTML  = '';
}

// ═══════════════════════════════════════════════════════════
// CONEXÃO
// ═══════════════════════════════════════════════════════════
function conectar() {
  intentionalExit = false;

  // Destrói socket anterior se existir
  if (socket) {
    try { socket.disconnect(); } catch(e) {}
    socket = null;
  }

  try {
    // polling primeiro: único modo que o proxy do Opera Mini suporta de forma estável.
    // upgrade:true permite que browsers modernos subam para WebSocket depois.
    socket = io({
      transports: ['polling', 'websocket'],
      upgrade: true,
      reconnection: true,          // Socket.IO reconecta sozinho
      reconnectionDelay: 1500,
      reconnectionDelayMax: 10000,
      reconnectionAttempts: 99999
    });
  } catch(e) {
    erroLogin('Nao foi possivel conectar.');
    return;
  }

  // ── Conectado ──────────────────────────────────────────
  socket.on('connect', function() {
    document.getElementById('offline-bar').style.display = 'none';
    socket.emit('message', JSON.stringify({ type:'join', name:myName }));

    // Opera Mini: keep-alive manual para impedir que o proxy derrube o canal
    // Cria apenas UM intervalo (pararRefresh() antes garante isso)
    if (isOperaMini) {
      pararRefresh();
      refreshInterval = setInterval(function() {
        if (socket && socket.connected) {
          socket.emit('message', JSON.stringify({ type:'poll_refresh' }));
        }
      }, 3000);
    }
  });

  // ── Mensagem recebida ──────────────────────────────────
  socket.on('message', function(raw) {
    var data;
    try { data = typeof raw === 'string' ? JSON.parse(raw) : raw; } catch(e) { return; }
    handleMsg(data);
  });

  // ── Desconectado ───────────────────────────────────────
  socket.on('disconnect', function() {
    if (intentionalExit) return;
    document.getElementById('offline-bar').style.display = 'block';
    // Socket.IO reconecta automaticamente (reconnection:true acima)
    // O keep-alive do Opera Mini será recriado no próximo 'connect'
    pararRefresh();
  });

  // ── Erro de conexão ────────────────────────────────────
  socket.on('connect_error', function() {
    document.getElementById('offline-bar').style.display = 'block';
  });
}

// Para o setInterval do Opera Mini com segurança
function pararRefresh() {
  if (refreshInterval) {
    clearInterval(refreshInterval);
    refreshInterval = null;
  }
}

// ═══════════════════════════════════════════════════════════
// TRATAR MENSAGENS
// ═══════════════════════════════════════════════════════════
function handleMsg(data) {
  if (data.type === 'welcome') {
    myName  = data.name;
    myColor = data.color;
    atualizarOnline(data.onlineCount);

    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-chat').style.display  = 'block';

    // Mostrar histórico recebido do servidor
    if (data.history && data.history.length) {
      for (var i = 0; i < data.history.length; i++) {
        renderMsg(data.history[i]);
      }
      addSys('--- historico ---');
    }

    addSys('Bem-vindo, <span style="color:' + esc(myColor) + '">' + esc(myName) + '</span>!');
    scrollBottom();
    return;
  }

  renderMsg(data);

  if (data.type === 'user_join' || data.type === 'user_leave') {
    atualizarOnline(data.onlineCount);
  }
  scrollBottom();
}

function renderMsg(data) {
  if (data.type === 'chat') {
    var own = (data.name === myName);
    addMsg(data.name, data.color, data.text, data.ts, own);
  } else if (data.type === 'user_join') {
    addSys('<span style="color:' + esc(data.color) + '">' + esc(data.name) + '</span> entrou na sala.');
  } else if (data.type === 'user_leave') {
    addSys('<span style="color:' + esc(data.color) + '">' + esc(data.name) + '</span> saiu da sala.');
  }
}

// ═══════════════════════════════════════════════════════════
// ENVIAR
// ═══════════════════════════════════════════════════════════
function enviar() {
  var inp  = document.getElementById('msg-input');
  var text = inp.value.trim();
  if (!text) return;
  if (!socket || !socket.connected) {
    addSys('Sem conexao. Aguarde...');
    return;
  }
  socket.emit('message', JSON.stringify({ type:'chat', text:text }));
  inp.value = '';
  inp.focus();
}

function teclaEnter(e) {
  if ((e.keyCode || e.which) === 13) enviar();
}

// ═══════════════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════════════
function addMsg(name, color, text, ts, own) {
  var box = document.getElementById('msgs-wrap');
  var div = document.createElement('div');
  div.className = 'msg' + (own ? ' own' : '');
  div.innerHTML =
    '<div class="msg-meta">' +
      '<span class="msg-name" style="color:' + esc(color) + '">' + esc(name) + '</span>' +
      '<span class="msg-time">' + formatTime(ts) + '</span>' +
    '</div>' +
    '<div class="msg-text">' + esc(text) + '</div>';
  box.appendChild(div);
}

function addSys(html) {
  var box = document.getElementById('msgs-wrap');
  var div = document.createElement('div');
  div.className = 'msg-sys';
  div.innerHTML = html;
  box.appendChild(div);
}

function scrollBottom() {
  var b = document.getElementById('msgs-wrap');
  b.scrollTop = b.scrollHeight;
}

function atualizarOnline(n) {
  var el = document.getElementById('online-count');
  if (el) el.innerHTML = n;
}

function erroLogin(msg) {
  document.getElementById('login-error').innerHTML = msg;
  document.getElementById('btn-entrar').disabled = false;
  document.getElementById('btn-entrar').innerHTML = 'Entrar no Chat';
}

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function formatTime(ts) {
  var d = ts ? new Date(ts) : new Date();
  var h = d.getHours(), m = d.getMinutes();
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('input-name').onkeydown = function(e) {
  if ((e.keyCode||e.which) === 13) entrar();
};
</script>
</body>
</html>
