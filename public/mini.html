<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatLivre</title>
<style>
body { margin:0; background:#0f1923; color:#d4dde8; font-family:courier,monospace; font-size:14px; }
#box {
  max-width:300px; margin:60px auto 0; padding:24px 18px;
  background:#162030; border:1px solid #1e3a52; border-radius:6px;
}
h1 { color:#4fc3f7; text-align:center; font-size:18px; letter-spacing:3px; text-transform:uppercase; margin-bottom:4px; }
p  { text-align:center; color:#456070; font-size:11px; margin-bottom:20px; }
label { display:block; font-size:11px; color:#456070; text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; }
input[type=text] {
  width:100%; background:#0f1923; border:1px solid #1e3a52;
  color:#d4dde8; font-family:courier,monospace; font-size:14px;
  padding:9px 10px; margin-bottom:12px; box-sizing:border-box;
}
input[type=submit] {
  width:100%; background:#0d3050; border:1px solid #4fc3f7;
  color:#4fc3f7; font-family:courier,monospace; font-size:13px;
  letter-spacing:2px; text-transform:uppercase; padding:10px; cursor:pointer;
}
</style>
</head>
<body>
<div id="box">
  <h1>ChatLivre</h1>
  <p>modo opera mini</p>
  <form action="/mini/join" method="POST">
    <label for="name">Seu apelido</label>
    <input type="text" id="name" name="name" maxlength="24" placeholder="Ex: Joao123" autocomplete="off">
    <input type="submit" value="Entrar no Chat">
  </form>
</div>
</body>
</html>
